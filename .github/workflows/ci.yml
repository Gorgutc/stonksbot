name: CI

# M0/M1 verify + harness gates. Comparable to the local pre-commit/pre-push gates
# (tools/git-gate.mjs), with CI-owned gate regression coverage:
#   ruff check .  |  pytest  |  check-kit  |  test-gates  |  secret-scan --all  |  evidence-gate
# Runs on PRs (feature branches) and on push to main (post-merge); no duplicate runs.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (ruff + pytest + gates, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout (full history — gates diff against origin/main)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Install project + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff) — verify.fast
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -q

      # The Node harness gates are Python-version-independent — run them on one
      # matrix leg only to avoid doubling gate runtime and flake surface.
      - name: Harness self-check (check-kit)
        if: matrix.python-version == '3.12'
        run: node tools/check-kit.mjs

      - name: Gate regression tests (test-gates)
        if: matrix.python-version == '3.12'
        run: node tools/test-gates.mjs

      - name: Secret scan — all tracked files
        if: matrix.python-version == '3.12'
        run: node tools/secret-scan.mjs --all

      - name: Evidence gate (diff vs origin/main)
        if: matrix.python-version == '3.12'
        run: |
          if git rev-parse --verify --quiet origin/main >/dev/null; then
            node tools/evidence-gate.mjs --base origin/main
          else
            node tools/evidence-gate.mjs
          fi
