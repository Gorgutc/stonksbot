name: CI

# M0 verify + harness gates. Mirrors the local pre-commit/pre-push gates
# (tools/git-gate.mjs) so a green CI == a clean local push:
#   ruff check .  |  pytest  |  check-kit  |  test-gates  |  secret-scan --all  |  evidence-gate
# Runs on PRs (feature branches) and on push to main (post-merge); no duplicate runs.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (ruff + pytest + gates)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (full history — gates diff against origin/main)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install project + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff) — verify.fast
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -q

      - name: Harness self-check (check-kit)
        run: node tools/check-kit.mjs

      - name: Gate regression tests (test-gates)
        run: node tools/test-gates.mjs

      - name: Secret scan — all tracked files
        run: node tools/secret-scan.mjs --all

      - name: Evidence gate (diff vs origin/main)
        run: |
          if git rev-parse --verify --quiet origin/main >/dev/null; then
            node tools/evidence-gate.mjs --base origin/main
          else
            node tools/evidence-gate.mjs
          fi
